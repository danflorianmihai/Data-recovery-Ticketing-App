<form id="hiddenForm" method="POST" target="hiddenFrame" 
action="https://docs.google.com/spreadsheets/d/e/2PACX-1vRnx33FC04x4K52rZQudWuhtZl66ry6fY1wZZC8fNwws1qu2fJyCVM126A_f6tegaqC_nXKa-7ki4-C/pubhtml"

<div class="nav-top">

<h3>Date client</h3>

<div id="client" class="hidden">
  <h3>Date contact</h3>
  <input type="text" id="name" placeholder="Nume complet" style="width:100%; padding:10px; margin-bottom:10px;"><br>
  <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;"><br>
  <input type="text" id="phone" placeholder="Telefon" style="width:100%; padding:10px; margin-bottom:10px;"><br>
  <button class="btn" onclick="submitForm()">Trimite solicitarea</button>
</div>

<script>
let formData = {}; // Aici salvăm datele selectate

function goNext(btn, key, value, nextId) {
    formData[key] = value; // Salvăm selecția
    
    // Vizual (opțional): marchează butonul ca selectat
    const parent = btn.parentElement;
    parent.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    // Trecerea la următorul pas
    parent.classList.add('hidden');
    document.getElementById(nextId).classList.remove('hidden');
}

function back(prevId) {
    const current = document.querySelector('div:not(.hidden)');
    current.classList.add('hidden');
    document.getElementById(prevId).classList.remove('hidden');
}

function submitForm() {
    // Adăugăm datele de contact în obiect
    formData['client_name'] = document.getElementById('name').value;
    formData['client_email'] = document.getElementById('email').value;
    formData['client_phone'] = document.getElementById('phone').value;

    const scriptURL = 'AKfycbxdbP7Z23dQrYv35IKViUlBeFEAzKvzYMsldGW-ecSFiC2zE_06kOzfMTTYd8PmEVPnpw';

    // Transformăm obiectul în format URLSearchParams pentru a fi citit de Apps Script
    const params = new URLSearchParams(formData);

    fetch(scriptURL, { 
        method: 'POST', 
        body: params,
        mode: 'no-cors' // Necesar pentru a evita erorile CORS cu Apps Script
    })
    .then(response => {
        alert("Solicitarea a fost trimisă cu succes!");
        window.location.reload(); // Resetăm formularul
    })
    .catch(error => console.error('Eroare!', error.message));
}
</script>
